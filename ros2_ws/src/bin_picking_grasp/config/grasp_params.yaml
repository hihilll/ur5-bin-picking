gripper_driver:
  ros__parameters:
    port: "/dev/ttyUSB0"        # USB转RS485 转换器串口（用 ls /dev/ttyUSB* 确认）
    baudrate: 115200            # 已实测（厂家上位机读回 115200/站号1）
    slave_id: 1
    simulate: false             # 调试无硬件时设 true
    # 指尖全闭能贴合(间隙0)，但滑块闭到底反馈≈363计数(1.8mm)不归零 → 偏移为负
    # 校验：发全闭指令，驱动日志"实际开口"应≈0.0mm；不为0则 width_offset -= 该值
    width_offset: -0.0018
    auto_calibrate: true        # 上电未初始化自动校准（全行程开合一次！）

grasp_planner:
  ros__parameters:
    base_frame: "base_link"
    # 抓取标注：CAD 模型系下的抓取位姿，扁平 [x,y,z,roll,pitch,yaw,width] 每7个一组
    # 默认：在零件原点正上方、夹爪朝下(roll=pi)、开口30mm。按你的零件标定后修改。
    grasp_annotations: [0.0, 0.0, 0.0, 3.14159, 0.0, 0.0, 0.03]
    approach_distance: 0.10
    min_grasp_score: 0.0

grasp_executor:
  ros__parameters:
    planning_group: "ur_manipulator"   # UR5 MoveIt 规划组名
    tcp_link: "gripper_grasp_tcp"      # 夹爪指尖 TCP（组合模型 ur5_with_gripper）
    base_frame: "base_link"
    simulate: false                    # true=不连 MoveIt，只打印动作（纯逻辑测试）
    approach_distance: 0.10
    lift_height: 0.15
    gripper_open_width: 0.05           # 全开 50mm (EPGC-50)
    gripper_grasp_force: 50.0
    gripper_speed: 50.0
    cartesian_step: 0.005              # 笛卡尔直线插值步长 m
    cartesian_min_fraction: 0.9        # 直线可行比例低于此则退化为自由规划
    # 规划/执行（真机首次务必用小的速度缩放，确认无误再调大）
    planning_time: 5.0                 # 单次规划最长 s
    planning_attempts: 5
    max_velocity_scaling: 0.2          # [0,1] 关节速度上限比例
    max_acceleration_scaling: 0.2
    goal_position_tolerance: 0.002     # m
    goal_orientation_tolerance: 0.02   # rad
    execution_timeout: 60.0            # 单段运动最长等待 s
    planning_retries: 2                # 自由规划偶发失败(RRTConnect随机/时间参数化,常见-2)自动重试次数
    # 放置位姿（基座系）[x,y,z,qx,qy,qz,qw]
    # enable_inhand=false: 解释为 TCP 放置位姿; true: 解释为零件目标位姿
    place_pose: [0.4, 0.3, 0.2, 1.0, 0.0, 0.0, 0.0]
    # 阶段4：在手位姿重估计 + 放置补偿
    enable_inhand: false               # 装配级精度时设 true
    inspection_pose: [0.3, 0.0, 0.5, 1.0, 0.0, 0.0, 0.0]  # 举到相机前的 TCP 位姿
    # 工作区碰撞体（基座系，用于 MoveIt 避障）——按真实尺寸/位置修改
    add_bin_collision: true
    # 平台模式开关：物件平铺在平台/桌面上(无框壁)=true；料框(有壁)=false
    #   true : 只建一块台面板防夹爪怼穿桌子；bin_center/bin_size 描述这块台板，
    #          零件放在其顶面 z = bin_center.z + bin_size.z/2。
    #          例：桌面高 0.0 → bin_center: [0.5,0.0,-0.01], bin_size: [0.5,0.4,0.02]
    #          （台板厚 2cm、顶面在 z=0，零件就摆在 z=0 台面上）
    #   false: 料框模式，建 底+四壁 5 个盒子；bin_center/bin_size 描述框腔
    flat_platform: false
    bin_center: [0.5, 0.0, 0.05]       # 料框中心 / 平台台板中心
    bin_size: [0.4, 0.3, 0.1]          # 料框 长x宽x高 / 平台台板 长x宽x厚
    bin_wall_thickness: 0.01           # 仅料框模式用（壁厚）
    # 桌面/地面碰撞板：机械臂装桌上，下方是实体桌面。不建模则自由规划会把
    # 手臂"向下绕"到桌面下方(真机危险)。建一块桌面板，规划器就会避开向下路径。
    add_ground_plane: true
    ground_z: -0.02                    # 桌面板顶面高度(基座系 m)。真实桌面≈基座平面(0)，
                                       # 默认设略低(-0.02)避免碰撞板与机械臂 base 自碰；按实机微调
    ground_center: [0.4, 0.0]          # 桌面板中心 XY（机械臂前方工作区）
    ground_size: [1.4, 1.4]            # 桌面板 XY 尺寸，够大以盖住手臂可能绕下的区域
    ground_thickness: 0.02             # 桌面板厚度
    # ⚠️ 若启动报"起始状态碰撞/start state in collision"，多半是桌面板碰到了基座：
    #    把 ground_z 再调低一点，或把 ground_center 往前移、避开基座正下方。

inhand_estimator:
  ros__parameters:
    base_frame: "base_link"
    tcp_link: "gripper_grasp_tcp"      # 与 grasp_executor 一致（夹爪指尖 TCP）
    stale_timeout: 1.0                 # 检测结果最大时效(s)

pick_loop:
  ros__parameters:
    scan_interval: 1.0                 # 每轮等待识别间隔 s
    settle_time: 1.0                   # 放置后稳定等待 s
    candidate_timeout: 2.0             # 候选时效 s
    empty_threshold: 3                 # 连续空次数判定料框清空
    max_consecutive_failures: 3        # 连续失败次数则安全停止
    max_picks: 0                       # 单次运行最大抓取数, 0=不限
    pick_timeout: 120.0                # 单次取放最长等待 s（超时判失败）
